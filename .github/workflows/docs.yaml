name: Docs

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev

      - name: Install dependencies
        run: |
          pip install .
          pip install sphinx furo myst-parser sphinx-autodoc-typehints

      - name: Verify package installation
        run: |
          python -c "import benchmarkfcns; print(f'Core functions found: {len(benchmarkfcns.__all__)}')"
          python -c "import benchmarkfcns.multiobjective; print(f'Multi-objective found: {len(benchmarkfcns.multiobjective.__all__)}')"

      - name: Build documentation
        run: |
          sphinx-build -b html docs/source docs/build/html
          # Prevent GitHub Pages from ignoring folders starting with underscores
          touch docs/build/html/.nojekyll
          # Recreate CNAME for custom domain
          echo "benchmarkfcns.info" > docs/build/html/CNAME

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/build/html
          branch: gh-pages
